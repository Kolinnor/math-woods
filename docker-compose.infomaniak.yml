name: math-woods

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?Set NEXT_SERVER_ACTIONS_ENCRYPTION_KEY in .env.production}
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?Set NEXT_SERVER_ACTIONS_ENCRYPTION_KEY in .env.production}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      RATE_LIMIT_REDIS_URL: redis://valkey:6379
      APP_DOMAIN: ${APP_DOMAIN}
      APP_URL: ${APP_URL:-}
      CRON_SECRET: ${CRON_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-1}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-0}
      SMTP_AUTH_REQUIRED: ${SMTP_AUTH_REQUIRED:-1}
      IMAGE_STORAGE_ENDPOINT: ${IMAGE_STORAGE_ENDPOINT:-}
      IMAGE_STORAGE_REGION: ${IMAGE_STORAGE_REGION:-}
      IMAGE_STORAGE_BUCKET: ${IMAGE_STORAGE_BUCKET:-}
      IMAGE_STORAGE_ACCESS_KEY_ID: ${IMAGE_STORAGE_ACCESS_KEY_ID:-}
      IMAGE_STORAGE_SECRET_ACCESS_KEY: ${IMAGE_STORAGE_SECRET_ACCESS_KEY:-}
      IMAGE_STORAGE_PUBLIC_BASE_URL: ${IMAGE_STORAGE_PUBLIC_BASE_URL:-}
      IMAGE_STORAGE_PATH_STYLE: ${IMAGE_STORAGE_PATH_STYLE:-1}
      IMAGE_UPLOAD_MAX_BYTES: ${IMAGE_UPLOAD_MAX_BYTES:-5242880}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      STATUS_DOMAIN: ${STATUS_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
      - uptime-kuma

volumes:
  postgres-data:
  valkey-data:
  uptime-kuma-data:
  caddy-data:
  caddy-config:
